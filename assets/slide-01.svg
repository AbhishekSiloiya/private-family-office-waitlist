    <g fill="none" stroke-width="3" stroke-linecap="round">
      <path d="M38 110 C170 55 260 170 390 110 S610 68 760 115 S880 152 896 88" stroke="#e4c97a" opacity=".72"/>
      <path d="M38 150 C160 132 220 93 338 142 S560 188 674 136 S815 84 896 128" stroke="#2dd4a0" opacity=".62"/>
      <path d="M38 78 C156 94 247 110 350 83 S560 30 688 88 S830 150 896 108" stroke="#f05252" opacity=".48"/>
